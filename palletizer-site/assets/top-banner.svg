<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-label="Паллетировщик плит - верхний баннер">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03060d"/>
      <stop offset="0.45" stop-color="#081629"/>
      <stop offset="1" stop-color="#090b12"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#9db2cb"/>
      <stop offset="0.45" stop-color="#f7fbff"/>
      <stop offset="0.7" stop-color="#536a86"/>
      <stop offset="1" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b7dff" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#18a7ff"/>
      <stop offset="0.5" stop-color="#48e6ff"/>
      <stop offset="0.82" stop-color="#18a7ff"/>
      <stop offset="1" stop-color="#0b7dff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#164269" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1600" height="360" fill="url(#bg)"/>
  <rect width="1600" height="360" fill="url(#grid)" opacity="0.42"/>
  <path d="M40 304 C300 245 415 296 650 242 C850 196 1005 126 1320 158 C1430 170 1512 150 1570 116" fill="none" stroke="#0c83ff" stroke-opacity="0.25" stroke-width="2"/>
  <path d="M0 38 H430 M520 38 H1600 M0 322 H510 M600 322 H1600" stroke="url(#cyanLine)" stroke-width="3" filter="url(#glow)"/>

  <g opacity="0.9">
    <rect x="72" y="80" width="260" height="160" rx="8" fill="#0b1726" stroke="#1bb7ff" stroke-width="2"/>
    <rect x="100" y="178" width="190" height="34" fill="#7b552d"/>
    <rect x="116" y="151" width="168" height="25" fill="#b9b0a2"/>
    <rect x="116" y="125" width="168" height="25" fill="#c9c0b1"/>
    <rect x="116" y="99" width="168" height="25" fill="#d5ccbd"/>
    <path d="M116 99 H284 M116 125 H284 M116 151 H284 M132 99 V176 M166 99 V176 M204 99 V176 M244 99 V176" stroke="#24282f" stroke-width="2" opacity="0.55"/>
    <path d="M92 214 H305" stroke="#26c7ff" stroke-width="3" filter="url(#glow)"/>
  </g>

  <text x="390" y="120" font-family="Arial Black, Impact, sans-serif" font-size="68" fill="url(#steel)" stroke="#193b6b" stroke-width="1.5">ПАЛЛЕТИРОВЩИК ПЛИТ</text>
  <text x="394" y="166" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#54d9ff">Оптимальное распределение листовых материалов по поддонам</text>

  <g font-family="Arial, sans-serif" font-size="18" fill="#d8efff">
    <rect x="394" y="202" width="210" height="58" rx="6" fill="#071827" stroke="#167cff"/>
    <text x="428" y="226" font-weight="700" fill="#56dcff">Импорт Excel</text>
    <text x="428" y="249" fill="#9db6cc">заявки и позиции</text>
    <rect x="626" y="202" width="230" height="58" rx="6" fill="#071827" stroke="#167cff"/>
    <text x="660" y="226" font-weight="700" fill="#56dcff">Автораскладка</text>
    <text x="660" y="249" fill="#9db6cc">с учетом веса и высоты</text>
    <rect x="878" y="202" width="236" height="58" rx="6" fill="#071827" stroke="#167cff"/>
    <text x="912" y="226" font-weight="700" fill="#56dcff">Печать результата</text>
    <text x="912" y="249" fill="#9db6cc">поддоны и содержимое</text>
  </g>

  <g transform="translate(1260 58)">
    <rect x="0" y="0" width="250" height="216" rx="8" fill="#0b1524" stroke="#1a9dff" stroke-width="2"/>
    <rect x="22" y="28" width="206" height="128" rx="4" fill="#121b2a"/>
    <rect x="42" y="50" width="72" height="18" fill="#7edbff" opacity="0.9"/>
    <rect x="42" y="82" width="148" height="12" fill="#7edbff" opacity="0.35"/>
    <rect x="42" y="108" width="130" height="12" fill="#7edbff" opacity="0.28"/>
    <rect x="42" y="134" width="160" height="12" fill="#7edbff" opacity="0.22"/>
    <path d="M24 180 H226" stroke="#25c7ff" stroke-width="3" filter="url(#glow)"/>
    <text x="40" y="205" font-family="Arial, sans-serif" font-size="18" fill="#e9f7ff">29900 ₽</text>
  </g>
</svg>
